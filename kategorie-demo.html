<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0700" />
    <title>Lexicanum — Kategorie-Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Share+Tech+Mono&family=Source+Serif+4:ital,wght@0,400&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg:#0a0700; --surface:#140e02; --primary:#ffb000; --accent:#ffcc33;
        --text:#ffc444; --border:#a86a00; --glow:rgba(255,176,0,0.4);
      }
      * { box-sizing:border-box; margin:0; padding:0; }
      html,body { background:var(--bg); color:var(--text); font-family:'Share Tech Mono',monospace; }
      .wrap { max-width:900px; margin:0 auto; padding:16px; }
      h1 { font-family:'Cinzel',serif; font-size:18px; letter-spacing:2px; color:var(--primary);
           text-shadow:0 0 12px var(--glow); margin-bottom:4px; }
      .sub { font-size:11px; color:var(--text); opacity:0.7; margin-bottom:16px; letter-spacing:1px; }
      .controls { position:sticky; top:0; background:var(--bg); padding:8px 0 10px; z-index:10;
                  border-bottom:1px solid var(--border); }
      .filter { width:100%; padding:12px 14px; background:var(--surface); border:1px solid var(--border);
                color:var(--text); font-family:'Share Tech Mono',monospace; font-size:15px; outline:none; }
      .filter:focus { border-color:var(--primary); box-shadow:0 0 0 2px var(--glow); }
      .count { font-size:11px; color:var(--accent); margin-top:8px; letter-spacing:1px; }
      .letters { display:flex; flex-wrap:wrap; gap:3px; margin-top:8px; }
      .letter { padding:3px 7px; background:var(--surface); border:1px solid var(--border);
                color:var(--text); font-size:11px; cursor:pointer; text-decoration:none; }
      .letter:hover { background:var(--glow); color:var(--accent); }
      .group-head { font-family:'Cinzel',serif; font-size:14px; color:var(--accent);
                    border-bottom:1px solid var(--border); padding:14px 0 4px; margin-top:10px; letter-spacing:2px; }
      .group-head.important { color:var(--bg); background:var(--primary); padding:8px 12px;
                              border:none; text-shadow:none; }
      .entry { display:block; padding:11px 12px; border:1px solid rgba(168,106,0,0.25);
               margin-top:6px; cursor:pointer; transition:all 0.12s; background:var(--surface); }
      .entry:hover { border-color:var(--primary); background:rgba(255,176,0,0.08); }
      .entry-name { font-family:'Cinzel',serif; font-size:14px; color:var(--text); }
      .entry-desc { font-family:'Source Serif 4',serif; font-size:12px; color:var(--text);
                    opacity:0.75; line-height:1.5; margin-top:4px; }
      .loading { padding:40px; text-align:center; color:var(--primary); letter-spacing:2px;
                 animation:blink 1.2s step-end infinite; }
      @keyframes blink { 50% { opacity:0.3; } }
      .detail { position:fixed; inset:0; background:var(--bg); z-index:50; overflow-y:auto; padding:16px; }
      .detail-close { font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px; color:var(--primary);
                      border:1px solid var(--border); padding:8px 16px; background:transparent;
                      cursor:pointer; margin-bottom:14px; }
      .detail h2 { font-family:'Cinzel',serif; color:var(--accent); font-size:20px; margin-bottom:12px;
                   text-shadow:0 0 12px var(--glow); }
      .detail p { font-family:'Source Serif 4',serif; font-size:14px; line-height:1.8; margin-bottom:12px; }
      .src { font-size:11px; color:var(--primary); margin-top:16px; display:inline-block; }
      .src-badge { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:1px;
                   background:var(--border); color:var(--bg); padding:1px 5px; margin-left:4px;
                   vertical-align:middle; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>⚔ KATEGORIE-DEMO</h1>
      <div class="sub">Imperiale Charaktere — Lexicanum (Grundlage) + Fandom, Wichtige oben</div>

      <div class="controls">
        <input class="filter" id="filter" placeholder="Namen filtern…" />
        <div class="count" id="count">Lade Archiv…</div>
        <div class="letters" id="letters"></div>
      </div>

      <div id="list"><div class="loading">▓ ARCHIV WIRD GELADEN ▓</div></div>
    </div>

    <script>
      // A CORS proxy lets the browser reach Lexicanum, which otherwise blocks
      // direct cross-origin requests. Fandom needs no proxy.
      // allorigins returns the raw body via its /raw endpoint.
      // NOTE: public proxies can be slow/unstable; for a real app, host your own.
      var CORS_PROXY = "https://api.allorigins.win/raw?url=";

      // Curated "important" names shown pinned at the top.
      // These use the EXACT article titles as they appear in the wikis.
      var IMPORTANT = [
        "Emperor of Mankind", "Roboute Guilliman", "Marneus Calgar",
        "Sanguinius", "Rogal Dorn", "Leman Russ", "Lion El'Jonson",
        "Vulkan", "Jaghatai Khan", "Ferrus Manus", "Corvus Corax",
        "Saint Celestine", "Belisarius Cawl", "Sebastian Yarrick",
        "Ciaphas Cain", "Gabriel Angelos", "Kaldor Draigo",
        "Malcador the Sigillite"
      ];
      var importantSet = {};
      IMPORTANT.forEach(function(n){ importantSet[n.toLowerCase()] = true; });

      // Two community wikis. Lexicanum is the primary source.
      var WIKIS = [
        {
          id: "lexicanum", label: "Lexicanum", proxy: true,
          api: "https://wh40k.lexicanum.com/mediawiki/api.php",
          base: "https://wh40k.lexicanum.com/wiki/",
          category: "Category:Characters (Imperial)"
        },
        {
          id: "fandom", label: "Fandom", proxy: false,
          api: "https://warhammer40k.fandom.com/api.php",
          base: "https://warhammer40k.fandom.com/wiki/",
          category: "Category:Imperial Characters"
        }
      ];

      var entriesByKey = {};

      function apiUrl(wiki, params) {
        params.format = "json"; params.origin = "*";
        var qs = Object.keys(params).map(function(k){
          return encodeURIComponent(k) + "=" + encodeURIComponent(params[k]);
        }).join("&");
        var full = wiki.api + "?" + qs;
        return wiki.proxy ? (CORS_PROXY + encodeURIComponent(full)) : full;
      }

      function loadWiki(wiki, cont) {
        var p = { action:"query", list:"categorymembers",
                  cmtitle:wiki.category, cmlimit:"500", cmtype:"page" };
        if (cont) p.cmcontinue = cont;
        return fetch(apiUrl(wiki, p)).then(function(r){ return r.json(); }).then(function(d){
          var members = (d.query && d.query.categorymembers) || [];
          members.forEach(function(m){
            var key = m.title.toLowerCase();
            if (!entriesByKey[key]) entriesByKey[key] = { title:m.title, sources:[] };
            if (entriesByKey[key].sources.indexOf(wiki) === -1) entriesByKey[key].sources.push(wiki);
          });
          document.getElementById("count").textContent =
            Object.keys(entriesByKey).length + " geladen…";
          if (d.continue && d.continue.cmcontinue) return loadWiki(wiki, d.continue.cmcontinue);
        }).catch(function(e){
          console.warn(wiki.label + " nicht erreichbar:", e.message);
        });
      }

      function loadAll() {
        return Promise.all(WIKIS.map(function(w){ return loadWiki(w); }));
      }

      function render(filterText) {
        var list = document.getElementById("list");
        var all = Object.keys(entriesByKey).map(function(k){ return entriesByKey[k]; });
        all.sort(function(a,b){ return a.title.localeCompare(b.title); });

        var entries = all;
        if (filterText) {
          var f = filterText.toLowerCase();
          entries = all.filter(function(e){ return e.title.toLowerCase().indexOf(f) !== -1; });
        }
        document.getElementById("count").textContent =
          entries.length + " von " + all.length + " Einträgen";

        function badges(e){
          return e.sources.map(function(s){
            return '<span class="src-badge">'+(s.id==="lexicanum"?"LEX":"FAN")+'</span>';
          }).join("");
        }
        function entryHtml(e){
          return '<div class="entry" data-name="'+encodeURIComponent(e.title)+'">'+
                 '<div class="entry-name">'+e.title+' '+badges(e)+'</div></div>';
        }

        var html = "";

        // Pinned "important" section (only when not filtering).
        if (!filterText) {
          var important = entries.filter(function(e){ return importantSet[e.title.toLowerCase()]; });
          if (important.length) {
            html += '<div class="group-head important" id="g-star">★ WICHTIGE</div>';
            important.forEach(function(e){ html += entryHtml(e); });
          }
        }

        // Full alphabetical list.
        var groups = {};
        entries.forEach(function(e){
          var L = e.title.charAt(0).toUpperCase();
          if (!/[A-Z]/.test(L)) L = "#";
          (groups[L] = groups[L] || []).push(e);
        });
        Object.keys(groups).sort().forEach(function(L){
          html += '<div class="group-head" id="g-'+L+'">'+L+'</div>';
          groups[L].forEach(function(e){ html += entryHtml(e); });
        });

        list.innerHTML = html || '<div class="loading">Keine Treffer</div>';

        var lt = document.getElementById("letters");
        var letterLinks = (!filterText && Object.keys(importantSet).length ? ['<a class="letter" href="#g-star">★</a>'] : [])
          .concat(Object.keys(groups).sort().map(function(L){
            return '<a class="letter" href="#g-'+L+'">'+L+'</a>';
          }));
        lt.innerHTML = letterLinks.join("");

        Array.prototype.forEach.call(list.querySelectorAll(".entry"), function(el){
          el.addEventListener("click", function(){
            var title = decodeURIComponent(el.getAttribute("data-name"));
            openDetail(entriesByKey[title.toLowerCase()] || { title:title, sources:WIKIS });
          });
        });
      }

      function openDetail(entry) {
        var title = entry.title;
        var sources = entry.sources && entry.sources.length ? entry.sources : WIKIS;
        var d = document.createElement("div");
        d.className = "detail";
        d.innerHTML = '<button class="detail-close">◄ Zurück</button>'+
                      '<h2>'+title+'</h2><div class="loading">Lade Eintrag…</div>';
        document.body.appendChild(d);
        d.querySelector(".detail-close").addEventListener("click", function(){ d.remove(); });

        // Try each source wiki in turn until one returns usable text.
        var i = 0;
        function tryNext() {
          if (i >= sources.length) {
            showResult("<p style='color:#ff5555'>Kein Textauszug aus den Archiven verfügbar.</p>", null);
            return;
          }
          var wiki = sources[i++];
          var p = { action:"parse", page:title, prop:"text", redirects:"1" };
          fetch(apiUrl(wiki, p)).then(function(r){ return r.json(); }).then(function(data){
            if (data.error) throw new Error(data.error.info || "Nicht gefunden");
            var rawHtml = (data.parse && data.parse.text && data.parse.text["*"]) || "";
            var doc = new DOMParser().parseFromString(rawHtml, "text/html");
            var content = doc.querySelector(".mw-parser-output") || doc.body;
            content.querySelectorAll(".toc,.mw-editsection,.reference,.navbox,.noprint,style,table,sup").forEach(function(el){ el.remove(); });
            var paras = [];
            content.querySelectorAll("p").forEach(function(pp){
              var t = pp.textContent.trim();
              if (t.length > 20) paras.push(t);
            });
            paras = paras.slice(0, 6);
            if (!paras.length) throw new Error("leer");
            var body = paras.map(function(t){ return "<p>"+t+"</p>"; }).join("");
            var url = wiki.base + encodeURIComponent(title.replace(/ /g,"_"));
            showResult(body, { label: wiki.label, url: url });
          }).catch(function(){ tryNext(); });
        }

        function showResult(body, src) {
          var srcLink = src
            ? '<a class="src" href="'+src.url+'" target="_blank" rel="noopener">◈ Quelle: '+src.label+' ↗</a>'
            : '';
          d.innerHTML = '<button class="detail-close">◄ Zurück</button>'+
                        '<h2>'+title+'</h2>'+body+srcLink;
          d.querySelector(".detail-close").addEventListener("click", function(){ d.remove(); });
        }

        tryNext();
      }

      document.getElementById("filter").addEventListener("input", function(e){
        render(e.target.value);
      });

      loadAll().then(function(){
        // Guarantee the important figures exist even if not in the category list.
        IMPORTANT.forEach(function(name){
          var key = name.toLowerCase();
          if (!entriesByKey[key]) {
            entriesByKey[key] = { title: name, sources: WIKIS.slice() };
          }
        });
        render("");
      }).catch(function(e){
        document.getElementById("list").innerHTML =
          '<div class="loading" style="color:#ff5555">Fehler: '+e.message+
          '<br><br>(Im Prototyp evtl. CORS — funktioniert auf GitHub Pages)</div>';
      });
    </script>
  </body>
</html>

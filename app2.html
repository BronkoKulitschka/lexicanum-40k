/* ============================================================================
 * DATA SOURCES — MediaWiki community wikis (no AI, no API key, free)
 * ----------------------------------------------------------------------------
 * Content is fetched live from two fan-run MediaWiki sites via their public
 * action API. This is a plain data request (action=query / parse), NOT an AI
 * API, so it costs nothing.
 *
 * NOTE on CORS: MediaWiki supports cross-origin reads when you pass
 * `origin=*`. Fandom generally allows this from the browser. Lexicanum has
 * stricter bot protection and may refuse some requests; we therefore try
 * Fandom first and fall back to Lexicanum.
 *
 * NOTE for the standalone Play Store app: all 40K names/images are
 * © Games Workshop and these wikis are unofficial (CC-BY-SA text). Showing
 * this content verbatim in a published app carries legal risk — revisit
 * before release. For the prototype it is fine for testing.
 * ========================================================================== */
const WIKI_SOURCES = [
  {
    id: "fandom",
    label: "Warhammer 40k Wiki",
    api: "https://warhammer40k.fandom.com/api.php",
    base: "https://warhammer40k.fandom.com/wiki/",
  },
  {
    id: "lexicanum",
    label: "Lexicanum",
    api: "https://wh40k.lexicanum.com/mediawiki/api.php",
    base: "https://wh40k.lexicanum.com/wiki/",
  },
];

// Build a CORS-enabled MediaWiki API URL.
function wikiUrl(source, params) {
  const usp = new URLSearchParams({ format: "json", origin: "*", ...params });
  return `${source.api}?${usp.toString()}`;
}

// Search a single wiki; returns array of {title, snippet, source}.
async function searchWiki(source, term, limit = 10) {
  const url = wikiUrl(source, {
    action: "query",
    list: "search",
    srsearch: term,
    srlimit: String(limit),
    srprop: "snippet",
  });
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${source.label} search ${res.status}`);
  const data = await res.json();
  const hits = data?.query?.search || [];
  return hits.map((h) => ({
    title: h.title,
    snippet: stripHtml(h.snippet || ""),
    source,
  }));
}

// Search both wikis in parallel; merge, de-dupe by title (Fandom first).
async function searchAllWikis(term, limit = 12) {
  const results = await Promise.allSettled(
    WIKI_SOURCES.map((s) => searchWiki(s, term, limit))
  );
  const merged = [];
  const seen = new Set();
  for (const r of results) {
    if (r.status !== "fulfilled") continue;
    for (const hit of r.value) {
      const key = hit.title.toLowerCase();
      if (seen.has(key)) continue;
      seen.add(key);
      merged.push(hit);
    }
  }
  if (!merged.length) {
    const reasons = results
      .filter((r) => r.status === "rejected")
      .map((r) => r.reason?.message)
      .join("; ");
    throw new Error(reasons || "No results found in either archive.");
  }
  return merged;
}

// Fetch a parsed article (intro sections) from a wiki by exact title.
async function fetchArticle(source, title) {
  const url = wikiUrl(source, {
    action: "parse",
    page: title,
    prop: "text|sections|displaytitle",
    redirects: "1",
  });
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${source.label} fetch ${res.status}`);
  const data = await res.json();
  if (data.error) throw new Error(data.error.info || "Article not found");
  return data.parse;
}

// --- HTML helpers (no external deps) -------------------------------------
function stripHtml(html) {
  if (typeof document !== "undefined") {
    const tmp = document.createElement("div");
    tmp.innerHTML = html;
    return (tmp.textContent || tmp.innerText || "").trim();
  }
  return html.replace(/<[^>]+>/g, "").trim();
}

/**
 * Convert a MediaWiki parsed article into the app's entry structure:
 * { title, category, faction, summary, sections[], keyFacts[], relatedTopics[],
 *   sourceLabel, sourceUrl }
 * Wiki links inside paragraphs are converted to [[Term]] markers so the
 * existing renderLinkedText() keeps cross-linking working.
 */
function parseArticleToEntry(parse, source) {
  const title = stripHtml(parse.displaytitle || parse.title || "");
  const html = parse.text?.["*"] || "";

  const doc =
    typeof document !== "undefined"
      ? new DOMParser().parseFromString(html, "text/html")
      : null;

  const summary =
    "Archive entry retrieved from the " + source.label + ".";
  const sections = [];
  const keyFacts = [];
  const relatedTopics = [];

  if (doc) {
    const content = doc.querySelector(".mw-parser-output") || doc.body;

    // Remove noise: tables of contents, edit links, reference markers, etc.
    content
      .querySelectorAll(
        ".toc, .mw-editsection, .reference, .navbox, .noprint, style, .reflist, sup.reference"
      )
      .forEach((el) => el.remove());

    // Infobox -> key facts (portable infobox is common on Fandom).
    const infobox = content.querySelector(
      ".portable-infobox, .infobox, table.infobox"
    );
    if (infobox) {
      infobox
        .querySelectorAll(".pi-item, tr")
        .forEach((row) => {
          const label =
            row.querySelector(".pi-data-label, th")?.textContent?.trim();
          const value =
            row.querySelector(".pi-data-value, td")?.textContent?.trim();
          if (label && value && label.length < 40 && value.length < 80) {
            keyFacts.push({ label, value });
          }
        });
    }

    // Walk top-level children, grouping paragraphs under their headings.
    let currentHeading = "Overview";
    let buffer = [];
    const flush = () => {
      const text = buffer.join("\n\n").trim();
      if (text) sections.push({ heading: currentHeading, content: text });
      buffer = [];
    };

    const nodes = Array.from(content.children);
    for (const node of nodes) {
      const tag = node.tagName?.toLowerCase();
      if (tag === "h2" || tag === "h3") {
        flush();
        currentHeading = node.textContent.replace(/\[edit\]/gi, "").trim();
        // Stop at boilerplate trailing sections.
        if (/^(references|sources|gallery|see also|external links)$/i.test(currentHeading)) {
          currentHeading = null;
          break;
        }
      } else if (tag === "p") {
        const withLinks = paragraphWithLinks(node);
        if (withLinks.trim().length > 0) buffer.push(withLinks);
        // collect related topics from links
        node.querySelectorAll("a[href^='/wiki/'], a[href*='/wiki/']").forEach((a) => {
          const t = a.textContent.trim();
          if (t && t.length < 40 && relatedTopics.length < 12 && !relatedTopics.includes(t)) {
            relatedTopics.push(t);
          }
        });
      }
      if (sections.length >= 6) break;
    }
    if (currentHeading) flush();
  }

  // Fallbacks if parsing yielded little.
  if (sections.length === 0) {
    sections.push({
      heading: "Overview",
      content:
        "This entry could not be fully parsed. Open it on the source wiki for the complete article.",
    });
  }

  return {
    title,
    category: "Archive Entry",
    faction: source.label,
    classification: "VERIDICAL ARCHIVE",
    warningLevel: "STANDARD",
    summary,
    sections: sections.slice(0, 6),
    keyFacts: keyFacts.slice(0, 8),
    relatedTopics: relatedTopics.slice(0, 10),
    quote: null,
    quoteSource: null,
    sourceLabel: source.label,
    sourceUrl: source.base + encodeURIComponent((title || "").replace(/ /g, "_")),
  };
}

// Convert a <p> node to text, turning internal wiki links into [[markers]].
function paragraphWithLinks(p) {
  let out = "";
  p.childNodes.forEach((child) => {
    if (child.nodeType === 3) {
      out += child.textContent;
    } else if (child.nodeType === 1) {
      const el = child;
      const href = el.getAttribute?.("href") || "";
      const text = el.textContent || "";
      if (el.tagName === "A" && /\/wiki\//.test(href) && text.trim() && !href.includes(":")) {
        out += `[[${text.trim()}]]`;
      } else {
        out += text;
      }
    }
  });
  return out;
}

function Warhammer40KEncyclopedia() {
  const [activeFaction, setActiveFaction] = useState(FACTIONS[0]);
  const [query, setQuery] = useState("");
  const [inputFocused, setInputFocused] = useState(false);
  const [category, setCategory] = useState("All");
  const [results, setResults] = useState(null);
  const [isLoading, setIsLoading] = useState(false);
  const [error, setError] = useState(null);
  const [history, setHistory] = useState([]);
  const [showHistory, setShowHistory] = useState(false);
  const [animating, setAnimating] = useState(false);
  const [indexData, setIndexData] = useState(null);
  const [searchHits, setSearchHits] = useState(null);
  const [indexLoading, setIndexLoading] = useState(false);
  const [activeIndexType, setActiveIndexType] = useState(null);
  const inputRef = useRef(null);
  const cacheRef = useRef({});
  const topRef = useRef(null);
  const colors = activeFaction.colors;

  // Scroll the view back to the top whenever a new entry or index is shown,
  // or when the active faction changes.
  useEffect(() => {
    const scroll = () => {
      if (typeof window !== "undefined") {
        window.scrollTo({ top: 0, behavior: "smooth" });
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;
      }
      if (topRef.current?.scrollIntoView) {
        topRef.current.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    };
    requestAnimationFrame(scroll);
  }, [results, indexData, searchHits, activeFaction]);

  const switchFaction = (faction) => {
    setAnimating(true);
    setTimeout(() => {
      setActiveFaction(faction);
      setAnimating(false);
      setIndexData(null);
      setActiveIndexType(null);
      setResults(null);
      setSearchHits(null);
      setError(null);
    }, 300);
  };

  const goHome = () => {
    setResults(null);
    setError(null);
    setQuery("");
    setIndexData(null);
    setActiveIndexType(null);
    setSearchHits(null);
    if (inputRef.current) inputRef.current.focus();
  };

  const loadIndex = async (indexType) => {
    setIndexLoading(true);
    setError(null);
    setResults(null);
    setIndexData(null);
    setSearchHits(null);
    setActiveIndexType(indexType);

    // Build a wiki search term combining the faction and the index topic.
    const term = `${activeFaction.shortName} ${indexType.query}`;

    try {
      const hits = await searchAllWikis(term, 18);
      setIndexData({
        indexTitle: `${indexType.label} — ${activeFaction.shortName}`,
        entries: hits.map((h) => ({ name: h.title, blurb: h.snippet, source: h.source })),
      });
    } catch (err) {
      setError(
        "THE INDEX HAS FAILED. The machine spirit reports: " +
          (err?.message || "unknown disturbance.") +
          " — Often a cross-origin (CORS) restriction in the preview; works in the standalone app."
      );
      setActiveIndexType(null);
    } finally {
      setIndexLoading(false);
    }
  };

  // Fetch and display a specific article by exact title from a given source.
  const openArticle = async (title, preferredSource = null) => {
    const cacheKey = `article|${title.toLowerCase()}`;
    if (cacheRef.current[cacheKey]) {
      setError(null);
      setSearchHits(null);
      setIndexData(null);
      setActiveIndexType(null);
      setResults(cacheRef.current[cacheKey]);
      return;
    }

    setIsLoading(true);
    setError(null);
    setResults(null);
    setSearchHits(null);

    const order = preferredSource
      ? [preferredSource, ...WIKI_SOURCES.filter((s) => s.id !== preferredSource.id)]
      : WIKI_SOURCES;

    let lastErr = null;
    for (const source of order) {
      try {
        const parse = await fetchArticle(source, title);
        const entry = parseArticleToEntry(parse, source);
        cacheRef.current[cacheKey] = entry;
        setResults(entry);
        setIsLoading(false);
        const hist = { query: title, faction: activeFaction.id, category, timestamp: Date.now() };
        setHistory((prev) => [hist, ...prev.filter((h) => h.query !== title).slice(0, 9)]);
        return;
      } catch (err) {
        lastErr = err;
      }
    }
    setError(
      "THE ARCHIVE IS SEALED. The machine spirit reports: " +
        (lastErr?.message || "the record could not be retrieved.") +
        " — This is often a cross-origin (CORS) restriction in the preview; it will work in the standalone app."
    );
    setIsLoading(false);
  };

  // Run a search across both wikis and show the list of matching records.
  const handleSearch = async (searchQuery = query) => {
    if (!searchQuery.trim()) return;

    setIsLoading(true);
    setError(null);
    setResults(null);
    setIndexData(null);
    setActiveIndexType(null);
    setSearchHits(null);

    try {
      const hits = await searchAllWikis(searchQuery.trim(), 12);
      setSearchHits({ term: searchQuery.trim(), items: hits });
      const entry = { query: searchQuery, faction: activeFaction.id, category, timestamp: Date.now() };
      setHistory((prev) => [entry, ...prev.filter((h) => h.query !== searchQuery).slice(0, 9)]);
    } catch (err) {
      setError(
        "THE ARCHIVE SEARCH FAILED. The machine spirit reports: " +
          (err?.message || "no signal from the noosphere.") +
          " — This is often a cross-origin (CORS) restriction in the preview; it will work in the standalone app."

  const renderLinkedText = (text) => {
    if (!text) return null;
    const parts = String(text).split(/(\[\[[^\]]+\]\])/g);
    return parts.map((part, i) => {
      const match = part.match(/^\[\[([^\]]+)\]\]$/);
      if (match) {
        const term = match[1].trim();
        return (
          <span
            key={i}
            className="lore-link"
            role="link"
            tabIndex={0}
            onClick={() => openArticle(term)}
            onKeyDown={(e) => { if (e.key === "Enter") openArticle(term); }}
          >
            {term}
          </span>
        );
      }
      return part;
    });

    <script>
      // Self-repair: strip any stray ES-module statements that would break
      // in-browser Babel, then transpile and run. This makes the page robust
      // even if an older code line slips in.
      (function () {
        try {
          var raw = document.getElementById("app-source").textContent;
          // Remove any import lines and 'export default' just in case.
          raw = raw.replace(/^\s*import\s.*$/gm, "");
          raw = raw.replace(/export\s+default\s+function/g, "function");
          // Ensure hooks are available from the global React.
          var prelude = "const { useState, useEffect, useRef } = React;\n";
          var code = Babel.transform(prelude + raw, { presets: ["react"] }).code;
          var s = document.createElement("script");
          s.textContent = code;
          document.body.appendChild(s);
        } catch (e) {
          document.getElementById("root").innerHTML =
            '<pre style="color:#ff5555;padding:20px;white-space:pre-wrap;font-family:monospace">' +
            "Fehler beim Start:\n" + (e && e.message ? e.message : e) + "</pre>";
        }
      })();

      // (No service worker here — this is a clean cache-free test file.)
      // Also actively unregister any existing SW and clear caches, so the
      // main page can recover from a stuck old service worker.
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) { r.unregister(); });
        });
      }
      if (window.caches && caches.keys) {
        caches.keys().then(function (keys) {
          keys.forEach(function (k) { caches.delete(k); });
        });
      }
